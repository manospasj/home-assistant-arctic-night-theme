# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

demo:

template:
  - sensor:
      - name: "Living Room Temperature"
        unit_of_measurement: "°C"
        device_class: temperature
        state: "{{ state_attr('climate.hvac', 'current_temperature') }}"
      - name: "Bedroom Temperature"
        unit_of_measurement: "°C"
        device_class: temperature
        state: "{{ state_attr('climate.ecobee', 'current_temperature') }}"
      - name: "Living Room Humidity"
        unit_of_measurement: "%"
        device_class: humidity
        state: "{{ state_attr('climate.hvac', 'current_humidity') | default(45, true) }}"
      - name: "Bedroom Humidity"
        unit_of_measurement: "%"
        device_class: humidity
        state: "{{ state_attr('climate.ecobee', 'current_humidity') | default(52, true) }}"
      - name: "Processor Use"
        unit_of_measurement: "%"
        state_class: measurement
        state: "23.4"
      - name: "Processor Temperature"
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        state: "52.1"
      - name: "Memory Use Percent"
        unit_of_measurement: "%"
        state_class: measurement
        state: "67.2"
      - name: "Memory Free"
        unit_of_measurement: "GiB"
        state_class: measurement
        state: "3.2"
      - name: "Disk Use Percent"
        unit_of_measurement: "%"
        state_class: measurement
        state: "41.8"
      - name: "Disk Free"
        unit_of_measurement: "GiB"
        state_class: measurement
        state: "234.5"
      - name: "Last Boot"
        device_class: timestamp
        state: "2026-03-05T08:23:14+00:00"

automation:
  - alias: "Set demo person locations"
    trigger:
      - platform: homeassistant
        event: start
    action:
      - service: device_tracker.see
        data:
          dev_id: john_doe_tracker
          location_name: home
          gps:
            - 32.8328
            - -117.2713
          gps_accuracy: 10
      - service: device_tracker.see
        data:
          dev_id: jane_doe_tracker
          location_name: not_home
          gps:
            - 32.8450
            - -117.2530
          gps_accuracy: 50
      - service: climate.turn_off
        target:
          entity_id:
            - climate.heatpump
            - climate.hvac
            - climate.ecobee
      - service: media_player.volume_set
        target:
          entity_id:
            - media_player.living_room
            - media_player.bedroom
        data:
          volume_level: 0.2
